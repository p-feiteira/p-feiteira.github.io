r.\",\"tagline\":\"A stack e irrelevante. A distancia entre a sua ideia e um produto entregue ficou muito menor.\",\"contactButton\":\"Iniciar Projeto\",\"resumeButton\":\"Descarregar CV\",\"profileAlt\":\"Pedro Feiteira, Inventor e Builder\",\"resumeAriaLabel\":\"Descarregar o curriculo de Pedro Feiteira (PDF)\",\"contactAriaLabel\":\"Navegar para a seccao de contacto\"},\"about\":{\"title\":\"Sobre Mim\",\"statement\":\"Construo o que imagino.\",\"description\":\"Nao sou um programador Python. Nao sou um programador TypeScript. A stack e irrelevante. A IA eliminou a distancia entre conceito e execucao — e tenho explorado isso desde entao. Arquiteto sistemas inteligentes, entrego aplicacoes full-stack e automatizo processos que antes requeriam equipas inteiras. A unica pergunta: o que devemos construir?\",\"location\":\"Baseado em Portugal\",\"remote\":\"Disponivel Remotamente\",\"hobbiesTitle\":\"Hobbies\"},\"hobbies\":{\"gaming\":{\"title\":\"Gaming\",\"description\":\"Uma das minhas paixoes sao os videojogos. Desde crianca que sou fascinado por boas historias, boa narrativa e resolver puzzles — uma das grandes razoes pela qual escolhi esta area.\"},\"fitness\":{\"title\":\"Fitness\",\"description\":\"Acredito que o equilibrio entre mente e corpo e fundamental para lidar com os desafios do dia-a-dia. Tento manter-me ativo e seguir uma alimentacao saudavel.\"},\"music\":{\"title\":\"Musica\",\"description\":\"Adoro todos os estilos de musica — cada genero tem o seu momento. A musica sempre teve um impacto significativo na minha vida e no meu trabalho.\"},\"learning\":{\"title\":\"Aprendizagem\",\"description\":\"Aprender sobre tudo sempre me fascinou. Estou sempre a descobrir algo novo — diferentes areas para dominar, nao apenas a nivel profissional.\"}},\"experience\":{\"title\":\"Experiencia\",\"ongoing\":\"A Decorrer\",\"entries\":[{\"role\":\"Engenheiro Senior Full-Stack+IA @ Aircall\",\"company\":\"AdvanceWorks\",\"period\":\"Set 2025 -- A Decorrer\",\"location\":\"Lisboa, Portugal\",\"description\":[\"Arquitetar e construir um novo assistente de suporte de IA generativa do zero, utilizando Python (FastAPI), LangChain, OpenAI e Pinecone para criar um pipeline RAG avancado integrado com Zendesk.\",\"Liderar o desenvolvimento de ponta a ponta de um novo portal de suporte self-service, projetado para reduzir significativamente o volume de tickets manuais e diminuir o tempo de resolucao do cliente.\",\"Desenvolver e manter a aplicacao full-stack, incluindo o frontend React/Next.js e o backend de microsservicos Python/FastAPI utilizando PostgreSQL e Redis.\",\"Proprietario e automatizador de toda a infraestrutura cloud na AWS usando Terraform (IaC), com Docker para containerizacao e GitLab para CI/CD.\",\"Engenharia de sistemas seguros e observaveis implementando AWS Cognito (JWT/Cookies) para autenticacao e integrando DataDog para monitorizacao abrangente da aplicacao.\",\"Nesta funcao, estou a aprender engenharia de prompts para tirar partido das ferramentas de IA mais recentes para melhorar a minha produtividade e eficiencia.\"],\"technologies\":[\"Python\",\"FastAPI\",\"LangChain\",\"OpenAI\",\"Pinecone\",\"React\",\"Next.js\",\"PostgreSQL\",\"Redis\",\"AWS\",\"Terraform\",\"Docker\",\"GitLab CI/CD\",\"AWS Cognito\",\"DataDog\"]},{\"role\":\"Programador Python\",\"company\":\"EngineAI\",\"period\":\"Set 2021 -- Jun 2025\",\"location\":\"Lisboa, Portugal\",\"description\":[\"Desenvolver e manter o SDK da empresa usando Python. Tambem foi usado Pandas para processamento de dados e Pytest para testes unitarios.\",\"Ajudei a construir pipelines CI/CD com GithubActions para o repositorio Python.\",\"Juntei-me a equipa de dashboards para ajudar a construir dashboards, usando SQL (snowflake), pandas e o SDK da empresa.\",\"Otimizar fluxos de dados entre servicos Python e bases de dados cloud (Snowflake).\",\"Ajudei a construir a suite de testes interativos da empresa com Playwright, tanto Python como JavaScript. Tambem criei testes de carga usando Grafana K6\",\"Atualmente a trabalhar no projeto de agentes LLM empresariais, onde sou responsavel por ligar o resultado da IA com a stack Web\",\"Aprendizagem continua de stacks tecnologicas modernas para apoiar projetos cross-funcionais\"],\"technologies\":[\"Python\",\"Pandas\",\"Pytest\",\"GitHub Actions\",\"SQL\",\"Snowflake\",\"Playwright\",\"JavaScript\",\"Grafana K6\"]},{\"role\":\"Estagio\",\"company\":\"Celfocus\",\"period\":\"Abr 2018 -- Jul 2018\",\"location\":\"Lisboa, Portugal\",\"description\":[\"Desenvolvi uma Prova de Conceito (PoC) para um sistema que gera automaticamente casos de teste a partir de requisitos de software.\",\"Construi uma aplicacao web funcional (full-stack) cobrindo os objetivos principais, demonstrando viabilidade de ponta a ponta.\",\"Tecnologias Chave: Node.js (backend), IBM Watson (funcionalidades alimentadas por IA) e Cloud Computing para deployment.\",\"Ganhei experiencia pratica em desenvolvimento full-stack, focando em escalabilidade e automacao.\"],\"technologies\":[\"Node.js\",\"IBM Watson\",\"Cloud Computing\"]}]},\"skills\":{\"title\":\"Competencias\",\"hardSkills\":\"Competencias Tecnicas\",\"softSkills\":\"Competencias Pessoais\",\"languages\":\"Idiomas\",\"hard\":{\"python\":\"Python\",\"sql\":\"SQL\",\"docker\":\"Docker\",\"cicd\":\"CI/CD\",\"typescript\":\"Typescript\",\"testing\":\"Testes\"},\"soft\":{\"communication\":\"Comunicacao\",\"problemSolving\":\"Resolucao de Problemas\",\"teamwork\":\"Trabalho em Equipa\",\"adaptability\":\"Adaptabilidade\",\"criticalThinking\":\"Pensamento Critico\",\"leadership\":\"Lideranca\",\"creativity\":\"Criatividade\",\"emotionalIntelligence\":\"Inteligencia Emocional\"},\"languageNames\":{\"portuguese\":\"Portugues\",\"english\":\"Ingles\"}},\"services\":{\"title\":\"O Que Construo\",\"subtitle\":\"A stack tecnologica nao e o limite. A unica questao e: o que devemos construir para si?\",\"cta\":\"Entrar em contacto\",\"items\":[{\"title\":\"Produtos com IA
